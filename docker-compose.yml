services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gateway:/app
      - ./tests:/app/tests
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - argus_net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus -h localhost"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - argus_net

  postgres_replica:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus -h localhost"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - argus_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - argus_net

  frontend:
    build: ./frontend-ts
    ports:
      - "3001:3001"
    depends_on:
      - gateway
    volumes:
      - ./frontend-ts:/app
    networks:
      - argus_net

volumes:
  pg_data:

networks:
  argus_net:
    driver: bridge
