<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Queryx - Query Gateway</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
				min-height: 100vh;
				color: #333;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
				padding: 20px;
			}

			header {
				background: white;
				border-radius: 8px;
				padding: 20px;
				margin-bottom: 20px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			}

			h1 {
				color: #667eea;
				margin-bottom: 10px;
			}

			.status {
				display: flex;
				gap: 20px;
				margin-top: 15px;
			}

			.status-item {
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.status-dot {
				width: 12px;
				height: 12px;
				border-radius: 50%;
				background: #4caf50;
			}

			.status-dot.error {
				background: #f44336;
			}

			main {
				background: white;
				border-radius: 8px;
				padding: 30px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			}

			.loading {
				text-align: center;
				padding: 40px;
				color: #666;
			}

			button {
				background: #667eea;
				color: white;
				padding: 10px 20px;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				font-size: 14px;
				transition: background 0.3s;
			}

			button:hover {
				background: #764ba2;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<header>
				<h1>🔐 Queryx</h1>
				<p>Secure Intelligent Query Gateway</p>
				<div class="status" id="status">
					<div class="status-item">
						<div class="status-dot" id="gateway-status"></div>
						<span>Gateway</span>
					</div>
					<div class="status-item">
						<div class="status-dot" id="redis-status"></div>
						<span>Redis</span>
					</div>
				</div>
			</header>

			<main id="root">
				<div class="loading">Loading Queryx...</div>
			</main>
		</div>

		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
