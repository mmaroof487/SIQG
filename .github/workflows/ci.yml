name: CI

on:
  push:
    branches: [main, feat/preprod]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd gateway
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd gateway
          pytest ../tests/ -v --cov=. --cov-report=term-missing --cov-report=xml --cov-report=html
        env:
          SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
          ENCRYPTION_KEY: "12345678901234567890123456789012"
          DB_PRIMARY_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
          DB_REPLICA_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379/0
          AI_PROVIDER: "mock"
          AI_ENABLED: false

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./gateway/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  integration_test:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      postgres_replica:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd gateway
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Integration Tests
        run: bash test_all_phases.sh
        env:
          SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
          ENCRYPTION_KEY: "12345678901234567890123456789012"
          DB_PRIMARY_URL: postgresql+asyncpg://argus:argus@localhost:5432/argus
          DB_REPLICA_URL: postgresql+asyncpg://argus:argus@localhost:5433/argus
          REDIS_URL: redis://localhost:6379/0
          AI_PROVIDER: "mock"
          AI_ENABLED: false
          ENVIRONMENT: ci
